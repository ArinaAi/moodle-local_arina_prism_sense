# Exclusions for duplication checks
# lang/ files are key=value string arrays — inherently repetitive, never real duplication.
# backup/ class files follow Moodle-mandated naming that SonarQube flags as duplicates on rename PRs.
sonar.cpd.exclusions=db/upgrade.php,lang/**,backup/**

# Exclude email templates (legacy table-based HTML layouts required for email client compatibility)
# and non-project directories from analysis
sonar.exclusions=email_templates/**,amd/node_modules/**,.backup/**
